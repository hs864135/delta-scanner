name: Delta Exchange Momentum Scanner

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  # Allows you to trigger it manually from the Actions tab
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ccxt pandas requests

      - name: Run Scanner Script
        run: python TeliGramAppAlertPriorityFirst24Vol.py
